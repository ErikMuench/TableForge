<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
      color: #333;
    }

    /* ===== HEADER ===== */
    header {
      position: relative;
      text-align: center;
      color: white;
    }

    .hero {
      width: 100%;
      height: 320px;
      object-fit: cover;
      filter: brightness(55%);
    }

    .header-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .header-text h1 {
      font-size: 2.5rem;
      margin: 0;
    }

    .header-text p {
      margin-top: 10px;
      font-size: 1.1rem;
      opacity: 0.9;
    }

    /* ===== NAV ===== */
    nav {
      background: #222;
      padding: 12px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav a {
      color: white;
      margin: 0 18px;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.95rem;
    }

    nav a:hover {
      color: #00c3ff;
    }

    /* ===== PRODUCT GRID ===== */
    .container {
      padding: 3rem 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 25px;
      max-width: 1100px;
      margin: auto;
    }

    .product {
      background: white;
      border-radius: 12px;
      padding: 1.2rem;
      text-align: center;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .product:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    /* ===== PRODUCT IMAGE ===== */
    .product img {
      width: 170px;
      height: 170px;
      object-fit: cover;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .product img:hover {
      transform: scale(1.05);
    }

    .product h3 {
      margin: 12px 0 5px;
    }

    .price {
      color: #2e7d32;
      font-weight: bold;
      margin-bottom: 12px;
    }

    /* ===== BUTTON ===== */
    button {
      background: #2e7d32;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #1f5c23;
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 1.5rem;
      background: #222;
      color: white;
      margin-top: 40px;
    }

    /* ===== ZOOM OVERLAY ===== */
    .zoom-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .zoom-overlay img {
      width: 700px;
      max-width: 90%;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(255,255,255,0.15);
    }
  </style>
</head>

<body>

<header>
  <img class="hero" src="images/Banner.jpg" alt="Shop Banner">
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="shop.html">Shop</a>
  <a href="custom.html">Custom Prints</a>
  <a href="contact.html">Contact</a>
</nav>
<div class="container">

  <div class="product">
    <img src="images/product01.jpg" alt="Product 1" onclick="openZoom(this)">
    <h3>City Ruins</h3>
    <p class="price">€99.99</p>
    <button onclick="alert('This is a demo. Add real checkout later!')">Buy</button>
  </div>

  <div class="product">
    <img src="images/product02.jpg" alt="Product 2" onclick="openZoom(this)">
    <h3>3x Dreadnaught Rocketlauncher</h3>
    <p class="price">€4.99</p>
    <button onclick="alert('This is a demo. Add real checkout later!')">Buy</button>
  </div>

</div>

<!-- ZOOM -->
<div class="zoom-overlay" id="zoomOverlay" onclick="closeZoom()">
  <img id="zoomImage" src="">
</div>

<footer>
  <p>© 2026 My Shop</p>
</footer>

<script>
  function openZoom(img) {
    document.getElementById("zoomImage").src = img.src;
    document.getElementById("zoomOverlay").style.display = "flex";
  }

  function closeZoom() {
    document.getElementById("zoomOverlay").style.display = "none";
  }
</script>

</body>
</html>
