<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Shop</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
    }

    /* PARALLAX BACKGROUND */
    .parallax {
      background-image: url("images/banner2.png");
      min-height: 100vh;
      background-attachment: fixed;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
    }

    nav {
      background: rgba(0,0,0,0.85);
      padding: 10px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .content {
      background: #f4f4f4;
      padding: 2rem;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .product {
      background: white;
      padding: 1rem;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }

    /* PRODUCT IMAGE */
    .product img {
      width: 180px;
      height: 180px;
      object-fit: cover;
      margin: 0 auto;
      display: block;
      border-radius: 10px;
      cursor: pointer; /* shows clickable */
      transition: transform 0.2s ease;
    }

    .product img:hover {
      transform: scale(1.05);
    }

    .price {
      color: green;
      font-weight: bold;
    }

    button {
      background: #28a745;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #218838;
    }

    footer {
      text-align: center;
      padding: 1rem;
      background: #222;
      color: white;
    }

    /* ===== ZOOM OVERLAY ===== */
    .zoom-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .zoom-overlay img {
      width: 1440px;   /* ~4x 180px */
      max-width: 90%;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }
  </style>
</head>

<body>

<!-- PARALLAX -->
<div class="parallax"></div>

<nav>
  <a href="index.html">Home</a>
  <a href="shop.html">Shop</a>
  <a href="custom.html">Custom Prints</a>
  <a href="contact.html">Contact</a>
</nav>


<!-- ZOOM OVERLAY -->
<div class="zoom-overlay" id="zoomOverlay" onclick="closeZoom()">
  <img id="zoomImage" src="">
</div>

<footer>
  <p>© 2026 My Shop</p>
</footer>

<script>
  function openZoom(img) {
    const overlay = document.getElementById("zoomOverlay");
    const zoomImg = document.getElementById("zoomImage");

    zoomImg.src = img.src;
    overlay.style.display = "flex";
  }

  function closeZoom() {
    document.getElementById("zoomOverlay").style.display = "none";
  }
</script>

</body>
</html>
