<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>

  <!-- Bootstrap (safe, no visual changes) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
      color: #333;
    }

    /* ===== HEADER ===== */
    header {
      position: relative;
      text-align: center;
      color: white;
    }

    .hero {
      width: 100%;
      height: 320px;
      object-fit: cover;
      filter: brightness(55%);
    }

    .header-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .header-text h1 {
      font-size: 2.5rem;
      margin: 0;
    }

    .header-text p {
      margin-top: 10px;
      font-size: 1.1rem;
      opacity: 0.9;
    }

    /* ===== NAV ===== */
    nav {
      background: #222;
      padding: 12px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav a {
      color: white;
      margin: 0 18px;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.95rem;
    }

    nav a:hover {
      color: #00c3ff;
    }

    /* ===== CONTACT BOX ===== */
    .contact-container {
      max-width: 700px;
      margin: 60px auto;
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .contact-container h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .contact-container p {
      text-align: center;
      margin-bottom: 25px;
      color: #555;
    }

    .contact-container input,
    .contact-container textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-family: Arial, sans-serif;
    }

    .contact-container textarea {
      resize: vertical;
      min-height: 120px;
    }

    button {
      background: #2e7d32;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #1f5c23;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      background: #222;
      color: white;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  <img class="hero img-fluid" src="images/banner.jpg" alt="Shop Banner">
</header>
    <h1>Contact Us</h1>
    <p>We’ll reply as soon as possible</p>
  </div>
</header>

<nav>
  <div class="container text-center">
    <a href="index.html">Home</a>
	  <a href="service.html">Services</a>
    <a href="shop.html">Shop</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<!-- CONTACT FORM -->
<div class="container">
  <div class="contact-container">

    <h2>Get in Touch</h2>
    <p>Send us a message and we will reply to your email.</p>

    <!-- ✅ FORMSPREE FORM -->
    <form action="https://formspree.io/f/FORM_ID" method="POST">

      <input type="text" name="name" placeholder="Your Name" required>

      <input type="email" name="email" placeholder="Your Email" required>

      <textarea name="message" placeholder="Your Message" required></textarea>

      <button type="submit">Send Message</button>

    </form>

  </div>
</div>

<footer>
  <p>© 2026 My Shop</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
