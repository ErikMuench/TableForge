<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Shop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }
    header {
      position: relative;
      text-align: center;
      color: white;
    }
    .hero {
      width: 100%;
      height: 300px;
      object-fit: cover;
      filter: brightness(60%);
    }
    .header-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    nav {
      background: #333;
      padding: 10px;
      text-align: center;
    }
    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }
    nav a:hover {
      text-decoration: underline;
    }
    .container {
      padding: 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .product {
      background: white;
      padding: 1rem;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }
    .product img {
      max-width: 100%;
      border-radius: 10px;
    }
    .price {
      color: green;
      font-weight: bold;
    }
    button {
      background: #28a745;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #218838;
    }
    footer {
      text-align: center;
      padding: 1rem;
      background: #222;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
  <img class="hero" src="LogoColor.PNG" alt="Shop Banner">
  <div class="header-text">
    <h1>My Online Shop</h1>
    <p>Customize your products below</p>
  </div>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="clothing.html">Clothing</a>
  <a href="accessories.html">Accessories</a>
  <a href="contact.html">Contact</a>
</nav>

<div class="container">

  <div class="product">
    <img src="images/product1.jpg" alt="Product 1">
    <h3>Product Name 1</h3>
    <p class="price">€19.99</p>
    <button onclick="alert('This is a demo. Add real checkout later!')">Buy</button>
  </div>

  <div class="product">
    <img src="images/product2.jpg" alt="Product 2">
    <h3>Product Name 2</h3>
    <p class="price">€29.99</p>
    <button onclick="alert('This is a demo. Add real checkout later!')">Buy</button>
  </div>

</div>

<footer>
  <p>© 2026 My Shop</p>
</footer>

</body>
</html>
